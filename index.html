<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girls Empowerment PWA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="logo.png" alt="Baya Logo" class="app-logo">
        <span class="header-text">Girls Empowerment</span>
    </header>

    <main>
        <section class="journal-section">
            <div class="date-time-wrapper">
                <span id="current-date"></span>
                <span id="current-time"></span>
            }</div>
            
            <h2>Daily Journal</h2>
            <textarea id="journal" rows="5" placeholder="How are you feeling today?"></textarea>
            
            <button onclick="saveJournal()" id="save-btn">Save Entry</button>
            <p class="journal-status" id="status-text">Your journal is private to this device.</p>
        </section>

        <section class="affirmation-section">
            <h2>Daily Affirmation</h2>
            <div id="affirmation-display" class="affirmation-text">"You are capable of amazing things."</div>
            <button onclick="newAffirmation()" class="btn-secondary">New Affirmation</button>
        </section>
        
        <section class="links-section">
            <a href="http://www.bayacorp.org" target="_blank" class="baya-link">
                Visit Baya Corp &rarr;
                <div class="tagline">Beautiful as you are</div>
            </a>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
