<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girls Empowerment PWA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>Girls Empowerment</header>

    <main>
        <section>
            <h2>Daily Journal</h2>
            <textarea id="journal" rows="4" placeholder="How are you feeling today?"></textarea>
            <button onclick="saveJournal()">Save Locally</button>
            <p style="font-size: 0.8rem; color: #636e72;">Your journal is private to this device.</p>
        </section>

        <section>
            <h2>Private Chat & Community</h2>
            <a href="#">Visit Baya Corp &rarr;</a>
        </section>

        <section>
            <h2>Daily Affirmation</h2>
            <div id="affirmation-display" style="font-style: italic; margin-bottom: 15px;">"You are capable of amazing things."</div>
            <button onclick="newAffirmation()">New Affirmation</button>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
