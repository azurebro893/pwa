<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baya Girls App</title>
    
    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    
    <meta name="theme-color" content="#be84d8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <nav class="navbar">
        <a href="https://www.bayacorp.org/" target="_blank" class="nav-logo">
            <img src="logo.png" alt="Baya Logo">
        </a>
        <div class="nav-links">
            <a href="https://www.bayacorp.org/" target="_blank">Visit Site</a>
        </div>
    </nav>

    <main class="app-container">
        <header class="hero-section">
            <h1 class="hero-title">Girls Empowerment</h1>
            <p class="hero-subtitle">Beautiful as you are.</p>
        </header>

        <div class="glass-card">
            <div id="affirmation-display" class="quote-text">"You are capable of amazing things."</div>
            <button onclick="newAffirmation()" class="secondary-btn">New Affirmation</button>
        </div>

        <div class="journal-card">
            <div class="card-header">
                <span id="current-date"></span>
                <span id="current-time" class="time-accent"></span>
            </div>
            <h2 class="section-label">Private Journal</h2>
            <textarea id="journal" placeholder="How are you feeling today?"></textarea>
            <button onclick="saveAndShare()" class="primary-btn">Save & Share to Notes</button>
            
            <div id="log-container" class="mini-log">
                <p id="last-log-text"></p>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
